<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>

<form>
    <table cellpadding="10" cellspacing="0" align="center" style="background-color: rgb(35, 179, 179);">
        <tr>
            <th colspan="2"><u>Registration Form</u></th>
        </tr>

        <tr>
            <td><label for="fname">First Name :</label></td>
            <td><input type="text" id="fname" name="fname" required></td>
        </tr>

        <tr>
            <td><label for="lname">Last Name :</label></td>
            <td><input type="text" id="lname" name="lname" required></td>
        </tr>

        <tr>
            <td><label for="email">E-mail :</label></td>
            <td><input type="email" id="email" name="email" required></td>
        </tr>

        <tr>
            <td><label for="password">Password :</label></td>
            <td><input type="password" id="password" name="password" required></td>
        </tr>

        <tr>
            <td><label for="dob">Date of Birth :</label></td>
            <td><input type="date" id="dob" name="dob"></td>
        </tr>

        <tr>
            <td>Gender :</td>
            <td>
                <input type="radio" id="male" name="gender" value="Male">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>

                <input type="radio" id="other" name="gender" value="Other">
                <label for="other">Other</label>
            </td>
        </tr>

        <tr>
            <td><label for="mobile">Mobile :</label></td>
            <td><input type="tel" id="mobile" name="mobile"></td>
        </tr>

        <tr>
            <td><label for="address">Address :</label></td>
            <td>
                <textarea id="address" name="address" rows="4" cols="22"></textarea>
            </td>
        </tr>

        <tr align="center">
            <td colspan="2">
                <input type="reset" value="Reset">
                <input type="submit" value="Submit">
            </td>
        </tr>
    </table>
</form>

</body>
</html>
