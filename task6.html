<!DOCTYPE html>
<html>
<head>
    <title>Student Table</title>
    <style>
        table {
            border-collapse: separate;
            border-spacing: 4px;
            border: 2px solid black;
        }

        th, td {
            border: 1px solid gray;
            padding: 8px;
            text-align: left;
        }

        th {
            font-weight: bold;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <th rowspan="2">Heading</th>
        <th>Students</th>
        <th colspan="3"><center>Details</center></th>
    </tr>

    <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Department</th>
        <th>Roll Number</th>
    </tr>

    <tr>
        <td rowspan="4">Student List</td>
        <td>1</td>
        <td>Victor</td>
        <td>Computer Science</td>
        <td>12345</td>
    </tr>

    <tr>
        <td>2</td>
        <td>Williams</td>
        <td>Electronics</td>
        <td>23456</td>
    </tr>

    <tr>
        <td>3</td>
        <td>Harry</td>
        <td>Electrical</td>
        <td>34567</td>
    </tr>

    <tr>
        <td>4</td>
        <td>Rick</td>
        <td>Civil</td>
        <td>45678</td>
    </tr>
</table>

</body>
</html>
