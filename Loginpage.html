<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
    width:350px;
    padding:30px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.3);
    color:white;
}

.container h1{
    text-align:center;
    margin-bottom:20px;
}

.input-box{
    margin-bottom:15px;
}

.input-box label{
    display:block;
    margin-bottom:5px;
}

.input-box input{
    width:100%;
    padding:10px;
    border:none;
    outline:none;
    border-radius:20px;
    background:rgba(255,255,255,0.2);
    color:white;
}

.input-box input::placeholder{
    color:#ddd;
}

.btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:20px;
    background:#00bfff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#009acd;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    color:#00bfff;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">
    <h1>LOGIN</h1>

    <div class="input-box">
        <label>Username</label>
        <input type="text" placeholder="Enter Username">
    </div>

    <div class="input-box">
        <label>Email</label>
        <input type="email" placeholder="Enter Email">
    </div>

    <div class="input-box">
        <label>Password</label>
        <input type="password" placeholder="Enter Password">
    </div>

    <button class="btn">LOGIN</button>

    <p>Don't have an account? <a href="#">Register</a></p>
</div>

</body>
</html>
