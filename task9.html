<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details Table</title>

    <style>
        body{
            font-family: "Times New Roman", serif;
            background-color: #f5f5f5;
        }

        table{
            border-collapse: collapse;
            width: 90%;
            margin: 20px auto;
            text-align: center;
        }

        th, td{
            border: 1px solid black;
            padding: 15px;
        }

        th{
            font-size: 28px;
            font-weight: bold;
        }

        td{
            font-size: 24px;
        }

        img{
            width: 120px;
            height: 150px;
            object-fit: cover;
        }
    </style>
</head>

<body>

<table>

    <tr>
        <th>No</th>
        <th>Image</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Age</th>
        <th>Hobby</th>
    </tr>

    <tr>
        <td>1</td>
        <td><img src="images/person1.jpg" alt="Person 1"></td>
        <td>James</td>
        <td>Frosty</td>
        <td>25</td>
        <td>Swimming</td>
    </tr>

    <tr>
        <td>2</td>
        <td><img src="images/person2.jpg" alt="Person 2"></td>
        <td>Anna</td>
        <td>Bayo</td>
        <td>23</td>
        <td>Cooking</td>
    </tr>

    <tr>
        <td>3</td>
        <td><img src="images/person3.jpg" alt="Person 3"></td>
        <td>James</td>
        <td>Latery</td>
        <td>22</td>
        <td>Running</td>
    </tr>

</table>

</body>
</html>
